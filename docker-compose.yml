services:

  fastapi_nginx:
    image: nginx:1.30.3-alpine3.23
    container_name: fastapi_nginx

    volumes:
      - ./static:/static:ro

    ports: []

    networks:
      - fastapi_net

    depends_on:
      - fastapi_app

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "4"


  fastapi_app:
    build: .
    image: fastapi_app:v-0.1
    container_name: fastapi_app

    restart: always

    env_file:
      - .env

    networks:
      - fastapi_net

    depends_on:
      fastapi_psql:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "4"


  fastapi_psql:
    image: postgres:16.14-alpine
    container_name: fastapi_psql

    env_file:
      - .env

    networks:
      - fastapi_net

    volumes:
      - fastapi_db:/var/lib/postgresql/data

    environment:
      - POSTGRES_DB=${DATABASE_NAME}
      - POSTGRES_USER=${DATABASE_USERNAME}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}" ]
      interval: 3s
      timeout: 3s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "4"


networks:
  fastapi_net:
    driver: bridge


volumes:
  fastapi_db: